<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语学习</title>
<style>
:root{
  --bg:#11131a;--card:#191c26;--card-2:#1f2330;--line:#2a2f3d;
  --ink:#e9ecf4;--ink-soft:#aeb4c5;--ink-mute:#6f7689;
  --accent:#7c9cff;--green:#5ec59a;--amber:#e2b23c;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh}
body{display:flex;flex-direction:column;align-items:center;padding:36px 16px 80px}

.title{font-size:26px;font-weight:700;margin-bottom:6px}
.sub{font-size:13.5px;color:var(--ink-mute);margin-bottom:28px}

/* tabs */
.tabs{display:flex;gap:8px;margin-bottom:24px;width:100%;max-width:440px}
.tab{
  flex:1;appearance:none;border:1px solid var(--line);background:var(--card);
  color:var(--ink-soft);font-size:14px;font-family:var(--sans);
  padding:10px 8px;border-radius:11px;cursor:pointer;transition:.15s;
}
.tab:hover{border-color:var(--accent);color:var(--ink)}
.tab.active{background:var(--accent);color:#0d1018;border-color:var(--accent);font-weight:700}

.panel{width:100%;max-width:440px;display:none;flex-direction:column;gap:11px}
.panel.show{display:flex}

/* item */
.item{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:15px 18px;text-decoration:none;color:var(--ink);transition:.15s;
}
.item:hover{border-color:var(--accent);background:var(--card-2)}
.item.today{border-color:var(--accent)}
.item.missing{opacity:.35;pointer-events:none}
.it-left{display:flex;flex-direction:column;gap:3px;min-width:0}
.it-label{font-size:15.5px;font-weight:600;display:flex;align-items:center;flex-wrap:wrap;gap:6px}
.it-date{font-size:12px;color:var(--ink-mute)}
.it-arrow{font-size:18px;color:var(--ink-mute);flex-shrink:0;margin-left:10px}

.badge{font-size:10.5px;padding:2px 7px;border-radius:6px;font-weight:700;line-height:1.6}
.badge.today{background:var(--accent);color:#0d1018}
.badge.rev{background:rgba(94,197,154,.15);color:var(--green)}

/* group */
.group-label{
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-mute);
  margin:14px 0 2px;display:flex;align-items:center;gap:9px;
}
.group-label:first-child{margin-top:0}
.group-label::after{content:"";flex:1;height:1px;background:var(--line)}

.empty{
  background:var(--card);border:1px dashed var(--line);border-radius:14px;
  padding:26px 18px;text-align:center;color:var(--ink-mute);font-size:13.5px;line-height:1.7;
}
</style>
</head>
<body>

<div class="title">📖 英语学习</div>
<div class="sub" id="sub"></div>

<div class="tabs">
  <button class="tab active" data-panel="study">学习篇</button>
  <button class="tab" data-panel="review">复习篇</button>
  <button class="tab" data-panel="grammar">语法篇</button>
</div>

<div class="panel show" id="study"></div>
<div class="panel" id="review"></div>

<div class="panel" id="grammar">
  <div class="group-label">基础</div>
  <a class="item" href="总语法/五大基本句型.html"><div class="it-left"><div class="it-label">五大基本句型</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/疑问句.html"><div class="it-left"><div class="it-label">疑问句</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/时态/时态.html"><div class="it-left"><div class="it-label">时态</div></div><div class="it-arrow">›</div></a>

  <div class="group-label">词性</div>
  <a class="item" href="总语法/词性/00-名词篇_普通名词与名词化_v2.html"><div class="it-left"><div class="it-label">00 · 名词篇</div><div class="it-date">普通名词与名词化</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/01-代词.html"><div class="it-left"><div class="it-label">01 · 代词</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/02-冠词.html"><div class="it-left"><div class="it-label">02 · 冠词</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/03-形容词.html"><div class="it-left"><div class="it-label">03 · 形容词</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/04-副词.html"><div class="it-left"><div class="it-label">04 · 副词</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/05-介词.html"><div class="it-left"><div class="it-label">05 · 介词</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/06-并列句.html"><div class="it-left"><div class="it-label">06 · 并列句</div></div><div class="it-arrow">›</div></a>

  <div class="group-label">动词</div>
  <a class="item" href="总语法/词性/07-动词/00-动词的静态属性.html"><div class="it-left"><div class="it-label">00 · 动词的静态属性</div></div><div class="it-arrow">›</div></a>
  <a class="item" href="总语法/词性/07-动词/01-动词变形与助动词.html"><div class="it-left"><div class="it-label">01 · 动词变形与助动词</div></div><div class="it-arrow">›</div></a>
</div>

<script>
/* ============ 配置区 ============ */
const START = '2026-07-20';           // 第一天
const REVIEW_GAPS = [1, 3, 7, 15];    // 艾宾浩斯复习间隔（天）
/* ================================ */

const WD = ['周日','周一','周二','周三','周四','周五','周六'];
const pad = n => String(n).padStart(2,'0');
const fileOf = d => pad(d.getMonth()+1) + '-' + pad(d.getDate()) + '.html';
const dayMs = 86400000;

function atMidnight(x){ const d = new Date(x); d.setHours(0,0,0,0); return d; }
const start = atMidnight(START);
const today = atMidnight(new Date());
const diffDays = Math.round((today - start) / dayMs);

document.getElementById('sub').textContent =
  diffDays >= 0 ? `已开始第 ${diffDays+1} 天` : '尚未开始';

function makeItem(date, opts={}){
  const a = document.createElement('a');
  a.className = 'item' + (opts.today ? ' today' : '') + (opts.missing ? ' missing' : '');
  a.href = fileOf(date);
  const badges =
    (opts.today ? '<span class="badge today">今天</span>' : '') +
    (opts.gap ? `<span class="badge rev">${opts.gap}天前</span>` : '');
  a.innerHTML =
    `<div class="it-left">
       <div class="it-label">${opts.label || ''}${badges}</div>
       <div class="it-date">${date.getMonth()+1}月${date.getDate()}日（${WD[date.getDay()]}）</div>
     </div>
     <div class="it-arrow">›</div>`;
  return a;
}

/* ---- 学习篇：从起始日到今天，倒序（最新在上） ---- */
const study = document.getElementById('study');
if(diffDays < 0){
  study.innerHTML = '<div class="empty">还没到开始日期</div>';
}else{
  for(let i = diffDays; i >= 0; i--){
    const d = new Date(start.getTime() + i*dayMs);
    study.appendChild(makeItem(d, { label:`第 ${i+1} 天 `, today: i === diffDays }));
  }
}

/* ---- 复习篇：今天该复习的日期 ---- */
const review = document.getElementById('review');
const due = REVIEW_GAPS
  .map(g => ({ gap:g, date:new Date(today.getTime() - g*dayMs) }))
  .filter(x => x.date >= start);

if(due.length === 0){
  review.innerHTML = '<div class="empty">今天没有需要复习的内容<br>继续保持 👍</div>';
}else{
  due.forEach(x => {
    const n = Math.round((x.date - start)/dayMs) + 1;
    review.appendChild(makeItem(x.date, { label:`第 ${n} 天 `, gap:x.gap }));
  });
}

/* ---- tab 切换 ---- */
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('show'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.panel).classList.add('show');
  });
});
</script>
</body>
</html>
